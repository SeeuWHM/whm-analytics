# WHM Analytics Collector - Nginx конфиг
# Добавить в /etc/nginx/sites-enabled/analytics.webhostmost.com
#
# Вставить ПЕРЕД основного location / блока

    # ===========================================
    # WHM Collector endpoints
    # ===========================================
    
    # Основной endpoint сбора аналитики
    location = /collect {
        # Rate limit на уровне Nginx (дополнительная защита)
        limit_req zone=collect_limit burst=50 nodelay;
        
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        
        # Прокси-заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        
        # Не кэшировать
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        
        # CORS (Collector сам добавляет, но для preflight)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
    }
    
    # Health check (для мониторинга)
    location = /health {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        
        # Кэшируем на 1 секунду (для балансировщиков)
        proxy_cache_valid 200 1s;
    }
    
    # Metrics endpoint (для Prometheus)
    location = /metrics {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        
        # Можно ограничить доступ по IP
        # allow 127.0.0.1;
        # allow 10.0.0.0/8;
        # deny all;
    }
    
    # Stats endpoint (JSON метрики)
    location = /stats {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
    }
    
