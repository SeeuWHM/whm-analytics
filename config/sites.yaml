  # ---------------------------------------------------------------------------
  # Staging - Front (analytics.ignat.best) - idsite=3
  # ---------------------------------------------------------------------------
  3:
    name: "Staging Front"
    base_url: "https://analytics.ignat.best"
    domains:
      - analytics.ignat.best
    client:
      trackScroll: true
      linkDomains:
        - staging.whmtest.com
    ga4:
      enabled: true
      measurement_id: "${GA4_STAGING_MEASUREMENT_ID}"
      api_secret: "${GA4_STAGING_API_SECRET}"
      events:
        - page_view
        - session_start
        - begin_checkout
        - scroll
    meta:
      enabled: true
      pixel_id: "${META_STAGING_PIXEL_ID}"
      access_token: "${META_STAGING_ACCESS_TOKEN}"
      test_event_code: "${META_STAGING_TEST_EVENT_CODE}"
      base_url: "https://analytics.ignat.best"
      events:
        - page_view
        - begin_checkout

  # ---------------------------------------------------------------------------
  # Staging - WHMCS (staging.whmtest.com) - idsite=4
  # ---------------------------------------------------------------------------
  4:
    name: "Staging WHMCS"
    base_url: "https://staging.whmtest.com"
    domains:
      - staging.whmtest.com
    client:
      trackScroll: false
      linkDomains:
        - analytics.ignat.best
    ga4:
      enabled: true
      measurement_id: "${GA4_STAGING_MEASUREMENT_ID}"
      api_secret: "${GA4_STAGING_API_SECRET}"
      events:
        - page_view
        - purchase
        - start_trial
        - start_free
    meta:
      enabled: true
      pixel_id: "${META_STAGING_PIXEL_ID}"
      access_token: "${META_STAGING_ACCESS_TOKEN}"
      test_event_code: "${META_STAGING_TEST_EVENT_CODE}"
      base_url: "https://staging.whmtest.com"
      events:
        - purchase
        - start_trial

  # ---------------------------------------------------------------------------
  # Production - Midlton Nails Studio (midltonnailsstudio.com) - idsite=5
  # ---------------------------------------------------------------------------
  5:
    name: "Midlton Nails Studio"
    domain: "midltonnailsstudio.com"
    type: "wordpress"
    enabled: true
