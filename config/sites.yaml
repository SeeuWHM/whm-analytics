    client:
      trackScroll: true
      linkDomains:
        # WHMCS client area
        - client.webhostmost.com
        # All fronts (cross-domain between each other)
        - webhostmost.com
        - webhostmost.at
        - webhostmost.be
        - webhostmost.ca
        - webhostmost.cy
        - webhostmost.de
        - webhostmost.ee
        - webhostmost.es
        - webhostmost.fi
        - webhostmost.fr
        - webhostmost.gr
        - webhostmost.in
