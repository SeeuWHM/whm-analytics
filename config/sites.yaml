# =============================================================================
# WHM Analytics - Sites Configuration
# =============================================================================
#
# SITES:
#   - site 1: WHMCS client area (client.webhostmost.com)
#   - site 2: All 28 front-ends (webhostmost.*)
#   - site 3: Staging front (analytics.ignat.best)
#   - site 4: Staging WHMCS (staging.whmtest.com)
#
# =============================================================================

# Global configuration (credentials from .env)
global:
  matomo_db:
    host: "${MATOMO_DB_HOST}"
    port: 3306
    user: "${MATOMO_DB_USER}"
    password: "${MATOMO_DB_PASSWORD}"
    database: "${MATOMO_DB_NAME}"

sites:
  # ---------------------------------------------------------------------------
  # Production - WHMCS (client.webhostmost.com) - idsite=1
  # ---------------------------------------------------------------------------
  1:
    name: "Production WHMCS"
    base_url: "https://client.webhostmost.com"
    domains:
      - client.webhostmost.com
    client:
      trackScroll: false
      linkDomains:
        - webhostmost.com
        - webhostmost.at
        - webhostmost.be
        - webhostmost.ca
        - webhostmost.cy
        - webhostmost.de
        - webhostmost.ee
        - webhostmost.es
        - webhostmost.fi
        - webhostmost.fr
        - webhostmost.gr
        - webhostmost.in
        - webhostmost.it
        - webhostmost.lt
        - webhostmost.lu
        - webhostmost.lv
        - webhostmost.md
        - webhostmost.mt
        - webhostmost.nl
        - webhostmost.pk
        - webhostmost.pt
        - webhostmost.ro
        - webhostmost.ru
        - webhostmost.si
        - webhostmost.sk
        - webhostmost.uk
        # Blog, Docs, Forum
        - blog.webhostmost.com
        - docs.webhostmost.com
        - forum.webhostmost.com
    ga4:
      enabled: true
      measurement_id: "${GA4_PROD_WHMCS_MEASUREMENT_ID}"
      api_secret: "${GA4_PROD_WHMCS_API_SECRET}"
      events:
        - page_view
        - purchase
        - start_trial
        - start_free
    meta:
      enabled: true
      pixel_id: "${META_PROD_PIXEL_ID}"
      access_token: "${META_PROD_ACCESS_TOKEN}"
      events:
        - purchase
        - start_trial

  # ---------------------------------------------------------------------------
  # Production - All 28 Fronts + Blog + Docs + Forum (webhostmost.*) - idsite=2
  # ---------------------------------------------------------------------------
  2:
    name: "Production Fronts"
    base_url: "https://www.webhostmost.com"
    domains:
      - www.webhostmost.com
      - webhostmost.com
      - nl.webhostmost.be
      - ru.webhostmost.md
      - www.webhostmost.at
      - webhostmost.at
      - www.webhostmost.be
      - webhostmost.be
      - www.webhostmost.ca
      - webhostmost.ca
      - www.webhostmost.cy
      - webhostmost.cy
      - www.webhostmost.de
      - webhostmost.de
      - www.webhostmost.ee
      - webhostmost.ee
      - www.webhostmost.es
      - webhostmost.es
      - www.webhostmost.fi
      - webhostmost.fi
      - www.webhostmost.fr
      - webhostmost.fr
      - www.webhostmost.gr
      - webhostmost.gr
      - www.webhostmost.in
      - webhostmost.in
      - www.webhostmost.it
      - webhostmost.it
      - www.webhostmost.lt
      - webhostmost.lt
      - www.webhostmost.lu
      - webhostmost.lu
      - www.webhostmost.lv
      - webhostmost.lv
      - www.webhostmost.md
      - webhostmost.md
      - www.webhostmost.mt
      - webhostmost.mt
      - www.webhostmost.nl
